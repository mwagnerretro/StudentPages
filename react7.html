<!DOCTYPE html>
<html>
<head>
    <title>React Basics</title>
    <meta charset="UTF-8">

    <style>
        
        body {
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }

        button {
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            border: 2px solid black;
            background-color: rgb(162, 162, 197);
            color: rgb(255, 255, 255);
            box-shadow: 2px 2px 5px gray;
            transition: 0.3s;
            padding: 10px 15px;

        }

        button:hover {
            transform: scale(1.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 20px auto;
            transition: 0.3s;
        }

        .big {
            transform: scale(1.5);
            background-color: red;
        }        


    </style>
</head>

<body>

<h1>React Demo Page</h1>

<p>This is my React Demo Page.</p>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

function ReactApp() {

    const [count, setCount] = React.useState(0);

    const [show, setShow] = React.useState(false);

    const [big, setBig] = React.useState(false);

    const [name, setName] = React.useState("");
    
    const [item, setItem] = React.useState("images/frenchtoast.jpg");

    function addCount() {
        setCount(count + 1);
    }

    function resetCount() {
        setCount(0);
    }

    function minusCount() {
        setCount(count - 1);
    }


    let clickMessage = "";
    let messageColor = "black";

    if (count >= 10) {
        clickMessage = "You've hit 10 clicks!";
    }

    if (count >= 15) {
        messageColor = "red";
        clickMessage = "You've hit 15 clicks!";
    }


    function toggleText() {
        if (show) {
            setShow(false);
        } else {
            setShow(true);
        }
    }

    let displayText = "";

    if (show) {
        displayText = "Keep your eye on the text";
    }

    let boxClass = "box";

    if (big === true) {
        boxClass = "box big";
    }


    function animateBox() {
        if (big === true) {
            setBig(false);
        } else {
            setBig(true);
        }
    }

    

    function updateName(event) {
        setName(event.target.value);
    }


    function pickFrenchToast() {
        setItem("images/frenchtoast.jpg");
    }

    function pickWaffles() {
        setItem("images/waffles.jpg");
    }



    return (
        <div>

            <h2>1. Counter</h2>

            <p>You clicked {count} times</p>

            <button onClick={addCount}>
                Click Me
            </button>

            <button onClick={minusCount}>
                Minus 1
            </button>

            <button onClick={resetCount}>
                Reset
            </button>

            <h3 style={{ color: messageColor }}>
                {clickMessage}
            </h3>
            <hr />
            

        <div>

            <h2>2. Show / Hide</h2>

            <button onClick={toggleText}>
                I'm a magic button
            </button>

            <p>{displayText}</p>

            <hr />

            <div>

            <h2>3. Animation Toggle</h2>

            <button onClick={animateBox}>
                Animate Box
            </button>

            <div className={boxClass}></div>

            <hr />


            <h2>4. Live Text Input</h2>

            <input
                type="text"
                placeholder="Type your name"
                onChange={updateName}
            />

            <p>Hello, {name}!</p>

            <hr />

            <h2>5. Image Picker</h2>

            <button onClick={pickFrenchToast}>
                French Toast
            </button>

            <button onClick={pickWaffles}>
                Waffles
            </button>

            <br /><br />

            <img src={item} width="300" />

            <hr />
        </div>

    </div>

</div>
      
    );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ReactApp />);

</script>

</body>
</html>
