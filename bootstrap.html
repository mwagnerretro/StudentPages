<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Test Page</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">

        <h1 class="text-center mb-4">Bootstrap Test Page</h1>

        <div class="row mb-3">

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-primary w-100">Click Me</button>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-primary w-100">Primary</button>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-secondary w-100">Secondary</button>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-success w-100">Success</button>
            </div>

        </div>


        <div class="row">

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-danger w-100">Danger</button>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-warning w-100">Warning</button>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-info w-100">Info</button>
            </div>

            <div class="col-sm-12 col-md-6 col-lg-3">
                <button class="btn btn-dark w-100">Dark</button>
            </div>

        </div>

    </div>

</body>
</html>
